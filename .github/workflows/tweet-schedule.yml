name: Tweet Schedule

on:
  schedule:
    # 月曜 8:00 JST = 日曜 23:00 UTC
    - cron: '0 23 * * 0'
    # 水曜 12:00 JST = 水曜 03:00 UTC
    - cron: '0 3 * * 3'
    # 金曜 19:00 JST = 金曜 10:00 UTC
    - cron: '0 10 * * 5'
  workflow_dispatch:
    inputs:
      date:
        description: '投稿対象日 (YYYY-MM-DD、省略時は今日)'
        required: false
      dry_run:
        description: 'ドライラン（実際には投稿しない）'
        type: boolean
        default: false

jobs:
  tweet:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tweet schedule (scheduled)
        if: github.event_name == 'schedule'
        run: node scripts/schedule-tweet.mjs
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}

      - name: Run tweet schedule (manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="--date ${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          node scripts/schedule-tweet.mjs $ARGS
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}

      - name: Commit updated SNS archive (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marketing/sns/
          git diff --staged --quiet || git commit -m "auto: tweet posted $(date +'%Y-%m-%d %H:%M UTC')"
          git push || true
