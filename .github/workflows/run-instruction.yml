name: Run Instruction Agent

on:
  issues:
    types: [opened, labeled]

jobs:
  run-instruction:
    if: |
      (github.event.action == 'opened' && contains(toJSON(github.event.issue.labels), '"instruction"')) ||
      (github.event.action == 'labeled' && (github.event.label.name == 'instruction' || github.event.label.name == 'urgent'))
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run instruction agent (urgent only)
        if: github.event.label.name == 'urgent'
        run: node scripts/agents/run-instruction.mjs --urgent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Run instruction agent (all instructions)
        if: github.event.label.name == 'instruction'
        run: node scripts/agents/run-instruction.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "auto: instruction agent $(date +'%Y-%m-%d %H:%M')"
          git push || true
