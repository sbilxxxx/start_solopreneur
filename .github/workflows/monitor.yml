name: Monitor

on:
  schedule:
    # 毎日 8:30 JST = 23:30 UTC（manager-agent より30分前に実行してIssueを積む）
    - cron: '30 23 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ドライラン（Issueを作成しない）'
        type: boolean
        default: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run monitor (scheduled)
        if: github.event_name == 'schedule'
        run: node scripts/monitor.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run monitor (manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node scripts/monitor.mjs --dry-run
          else
            node scripts/monitor.mjs
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
